name: Build LaTeX Report

on:
  push:
    paths:
      - '**.tex'
      - '**.bib'
      - '.github/workflows/latex.yml'
  workflow_dispatch:

jobs:
  build_report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install TeX Live
      run: sudo apt-get update && sudo apt-get install -y texlive-full

    - name: Create build directory
      run: mkdir -p build

    - name: Compile LaTeX (1st pass)
      run: pdflatex -interaction=nonstopmode -output-directory=build report.tex

    - name: Run BibTeX
      run: bibtex build/report

    - name: Compile LaTeX (2nd pass)
      run: pdflatex -interaction=nonstopmode -output-directory=build report.tex

    - name: Compile LaTeX (3rd pass)
      run: pdflatex -interaction=nonstopmode -output-directory=build report.tex

    - name: Rename output PDF
      run: mv build/report.pdf build/email2trip-report.pdf

    - name: Upload PDF as artifact
      uses: actions/upload-artifact@v4
      with:
        name: email2trip-report
        path: build/email2trip-report.pdf
        
    - name: Get latest tag
      id: get_tag
      run: |
        git fetch --tags
        latest=$(git tag | sort -V | tail -n 1)
        echo "Latest tag: $latest"
        if [ -z "$latest" ]; then
          next="v0.1"
        else
          base=$(echo "$latest" | sed 's/^v//')
          major=$(echo "$base" | cut -d. -f1)
          minor=$(echo "$base" | cut -d. -f2)
          next="v$major.$((minor + 1))"
        fi
        echo "Next tag: $next"
        echo "tag_name=$next" >> $GITHUB_OUTPUT
    
    - name: Create new tag
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag ${{ steps.get_tag.outputs.tag_name }}
        git push origin ${{ steps.get_tag.outputs.tag_name }}
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_tag.outputs.tag_name }}
        name: Release ${{ steps.get_tag.outputs.tag_name }}
        files: build/email2trip-report.pdf
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}