name: Build LaTeX Report

on:
  push:
    paths:
      - '**.tex'
      - '**.bib'
      - '.latexmkrc'
      - '.github/workflows/latex.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_report:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Compile LaTeX with latex-action
      uses: xu-cheng/latex-action@v4
      with:
        root_file: report.tex
        texlive_version: 2026

    - name: Prepare artifact
      run: |
        mkdir -p build
        cp report.pdf build/email2trip-report.pdf

    - name: Upload PDF as artifact
      uses: actions/upload-artifact@v7
      with:
        name: email2trip-report
        path: build/email2trip-report.pdf
        
    - name: Get latest tag
      id: get_tag
      run: |
        git fetch --tags
        latest=$(git tag | sort -V | tail -n 1)
        echo "Latest tag: $latest"
        if [ -z "$latest" ]; then
          next="v0.1"
        else
          base=$(echo "$latest" | sed 's/^v//')
          major=$(echo "$base" | cut -d. -f1)
          minor=$(echo "$base" | cut -d. -f2)
          next="v$major.$((minor + 1))"
        fi
        echo "Next tag: $next"
        echo "tag_name=$next" >> $GITHUB_OUTPUT
    
    - name: Create new tag
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag ${{ steps.get_tag.outputs.tag_name }}
        git push origin ${{ steps.get_tag.outputs.tag_name }}
    
    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ steps.get_tag.outputs.tag_name }}
      run: |
        gh release create "$TAG_NAME" build/email2trip-report.pdf \
          --title "Release $TAG_NAME" \
          --verify-tag
